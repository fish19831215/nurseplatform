<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貼心護士 - 智能客服</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #0ea5e9;
    --gradient: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%);
    --bg-light: #f8fafc;
    --bg-white: #ffffff;
    --text-dark: #1e293b;
    --text-gray: #64748b;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 50%, #fef3c7 100%); min-height: 100vh; }

.container { max-width: 800px; margin: 0 auto; padding: 20px; }
.header { text-align: center; padding: 30px 0; }
.logo { width: 80px; height: 80px; background: var(--gradient); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 36px; color: white; box-shadow: var(--shadow-lg); }
.header h1 { font-size: 28px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.header p { color: var(--text-gray); }

.chat-box { background: var(--bg-white); border-radius: 24px; box-shadow: var(--shadow-lg); overflow: hidden; height: 500px; display: flex; flex-direction: column; }
.chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; }

.message { display: flex; margin-bottom: 16px; align-items: flex-start; }
.message.user { flex-direction: row-reverse; }
.message-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.message.user .message-avatar { background: var(--gradient); color: white; margin-left: 12px; }
.message.bot .message-avatar { background: #10b981; color: white; margin-right: 12px; }
.message-content { max-width: 70%; padding: 14px 18px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
.message.user .message-content { background: var(--gradient); color: white; border-bottom-right-radius: 4px; }
.message.bot .message-content { background: white; color: var(--text-dark); border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; box-shadow: var(--shadow); }

.chat-input { padding: 20px; background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 12px; }
.chat-input input { flex: 1; padding: 16px 20px; background: #f1f5f9; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; transition: all 0.3s; }
.chat-input input:focus { border-color: var(--primary); background: white; }
.chat-input button { padding: 16px 28px; background: var(--gradient); border: none; border-radius: 12px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
.chat-input button:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.chat-input button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.quick-replys { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px 16px; }
.quick-reply { padding: 10px 16px; background: white; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 13px; color: var(--text-gray); cursor: pointer; transition: all 0.3s; }
.quick-reply:hover { border-color: var(--primary); color: var(--primary); }

.typing { display: none; padding: 0 20px 16px; }
.typing.show { display: flex; align-items: center; gap: 8px; color: var(--text-gray); font-size: 13px; }
.typing-dots { display: flex; gap: 4px; }
.typing-dots span { width: 8px; height: 8px; background: var(--text-gray); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
.typing-dots span:nth-child(1) { animation-delay: -0.32s; }
.typing-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

.back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--primary); text-decoration: none; font-weight: 500; margin-bottom: 20px; }
.back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

</div>

function sendMessage(msg) {
    var input = document.getElementById('userInput');
    var message = msg || input.value.trim();
    if(!message) return;
    
    // 顯示用戶訊息
    addMessage(message, 'user');
    input.value = '';
    
    // 顯示輸入中
    document.getElementById('typing').classList.add('show');
    document.getElementById('sendBtn').disabled = true;
    
    // 模擬 AI 回覆延遲
    setTimeout(function() {
        document.getElementById('typing').classList.remove('show');
        document.getElementById('sendBtn').disabled = false;
        
        var reply = getReply(message);
        addMessage(reply, 'bot');
        
        // 滾動到底部
        var messages = document.getElementById('chatMessages');
        messages.scrollTop = messages.scrollHeight;
    }, 1000 + Math.random() * 1000);
}

function addMessage(text, type) {
    var messages = document.getElementById('chatMessages');
    var icon = type === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
    var div = document.createElement('div');
    div.className = 'message ' + type;
    div.innerHTML = '<div class="message-avatar">' + icon + '</div><div class="message-content">' + text.replace(/\n/g, '<br>') + '</div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function getReply(message) {
    message = message.toLowerCase();
    
    // 關鍵詞匹配
    for(var key in knowledgeBase) {
        if(key === 'default') continue;
        if(message.indexOf(key) !== -1) {
            return knowledgeBase[key];
        }
    }
    
    return knowledgeBase['default'];
}

// 初始化
document.getElementById('userInput').focus();
